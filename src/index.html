<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Ma ville, notée — toutes les communes de France sur 10</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="La note sur 10 de chaque commune française : sécurité, santé, commerces, enseignement, sports, culture, transports et niveau de vie.">
  <!-- NOINDEX temporaire : l'URL github.io ne doit PAS être indexée (le site
       sera hébergé sur son vrai domaine). Retiré automatiquement par deploy.yml
       quand la variable de dépôt SITE_INDEXABLE vaut "true". Un robots.txt ne
       suffirait pas : sur un site projet Pages il devrait vivre à la racine de
       zikaoinfo.github.io, hors de notre contrôle. -->
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#faf6ef">
  <!-- Anti-flash : pose data-theme ET la theme-color AVANT le chargement
       d'Angular. Doit rester aligné avec ThemeService (clé mvn-theme,
       défaut system, couleurs META_THEME_COLOR). -->
  <script>
    (function () {
      var theme = 'light';
      try {
        var pref = localStorage.getItem('mvn-theme');
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        theme = pref === 'dark' || (pref !== 'light' && systemDark) ? 'dark' : 'light';
      } catch (e) { /* stockage/matchMedia indisponibles : clair */ }
      document.documentElement.dataset.theme = theme;
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme === 'dark' ? '#10152a' : '#faf6ef');
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- Polices auto-hébergées (fini fonts.gstatic.com) : préchargées pour
       raccourcir le chemin critique. font-display: optional (styles.scss)
       évite le reflow au swap qui causait le CLS. -->
  <link rel="preload" href="fonts/fraunces-variable-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/outfit-variable-latin.woff2" as="font" type="font/woff2" crossorigin>
  <!-- Placé après les ressources critiques : le manifeste PWA n'est pas
       bloquant pour le rendu (chaîne critique la plus longue signalée par
       Lighthouse — n'affecte pas le FCP réel, cf. plan Lighthouse tâche 5). -->
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <app-root></app-root>
</body>
</html>
