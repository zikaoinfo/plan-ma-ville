<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Ma ville, notée — toutes les communes de France sur 10</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="La note sur 10 de chaque commune française : sécurité, santé, commerces, enseignement, sports, culture, transports et niveau de vie.">
  <meta name="theme-color" content="#18203a">
  <!-- Anti-flash : pose data-theme AVANT le chargement d'Angular.
       Doit rester aligné avec ThemeService (clé mvn-theme, défaut system). -->
  <script>
    (function () {
      var theme = 'light';
      try {
        var pref = localStorage.getItem('mvn-theme');
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        theme = pref === 'dark' || (pref !== 'light' && systemDark) ? 'dark' : 'light';
      } catch (e) { /* stockage/matchMedia indisponibles : clair */ }
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

</body>
</html>
