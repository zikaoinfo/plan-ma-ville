name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache generated data
        id: data-cache
        uses: actions/cache@v4
        with:
          path: public/data
          key: public-data-${{ hashFiles('tools/data-pipeline/**/*.ts', 'tools/data-pipeline/*.json') }}

      - name: Build data files
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: npm run data:build

      - name: Inject environment secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          ENV=src/environments/environment.ts
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" "$ENV"
          sed -i "s|__SUPABASE_ANON_KEY__|${SUPABASE_ANON_KEY}|g" "$ENV"
          sed -i "s|__WORKER_URL__|${WORKER_URL}|g" "$ENV"

      # L'URL github.io ne doit pas être indexée tant que le site n'est pas sur
      # son domaine définitif. Le jour venu : définir la variable de dépôt
      # SITE_INDEXABLE=true (Settings → Secrets and variables → Variables) —
      # cette étape retire alors la balise noindex de toutes les pages.
      - name: Allow indexing (SITE_INDEXABLE=true)
        if: vars.SITE_INDEXABLE == 'true'
        run: sed -i '/name="robots" content="noindex/d' src/index.html

      - name: Build app
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/ma-ville-notes/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
